name: Generate PR & Merge Documentation

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: write

jobs:
  generate-docs:
    # Run if it's an open PR, OR if it's a closed PR that was successfully merged
    if: |
      github.event.action != 'closed' || 
      (github.event.action == 'closed' && github.event.pull_request.merged == true)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Use head_ref for active PRs, otherwise use the merge commit SHA for closed PRs
          ref: ${{ github.event.action == 'closed' && github.event.pull_request.merge_commit_sha || github.head_ref }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Wipe the temporary folder artifact state if active PR to start fresh per commit
      - name: Pre-clean for active PRs
        if: github.event.action != 'closed'
        run: rm -f DOCUMENTATION.md

       Cav- name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Build merge context
        run: |
          python scripts/build_merge_context.py \
            --source-branch "${{ github.event.pull_request.head.ref }}" \
            --target-branch "${{ github.event.pull_request.base.ref }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --merge-sha "${{ github.event.action == 'closed' && github.event.pull_request.merge_commit_sha || github.event.pull_request.head.sha }}" \
            --output context.json

      - name: Generate documentation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python src/generate_documentation.py \
            --context context.json \
            --output DOCUMENTATION.md \
            --use-gemini

      - name: Commit and push documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          git add DOCUMENTATION.md
          
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
            exit 0
          fi
          
          # Target configuration dynamically changes:
          # If the PR is closed -> Push directly to target branch
          # If the PR is active -> Push back into the PR's source branch
          if [ "${{ github.event.action }}" = "closed" ]; then
            git commit -m "docs: update DOCUMENTATION.md after merge of PR #${{ github.event.pull_request.number }}"
            git push origin HEAD:${{ github.event.pull_request.base.ref }}
          else
            git commit -m "docs: preview update of DOCUMENTATION.md for PR #${{ github.event.pull_request.number }} [skip ci]"
            git push origin HEAD:${{ github.head_ref }}
          fi
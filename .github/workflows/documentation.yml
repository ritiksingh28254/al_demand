name: Generate PR Documentation

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

jobs:
  generate-documentation:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Clear any existing file so append mode starts fresh for this specific run
      - name: Initialize Documentation File
        run: rm -f DOCUMENTATION.md

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # FIXED: Added the required --output flag matching your script parser
      - name: Build Merge Context
        run: |
          python scripts/build_merge_context.py \
            --source-branch "${{ github.head_ref }}" \
            --target-branch "${{ github.base_ref }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --merge-sha "${{ github.event.pull_request.head.sha }}" \
            --output context.json

      # FIXED: Added the required --context flag matching your script parser
      - name: Generate Documentation
        run: |
          python src/generate_documentation.py \
            --context context.json \
            --output DOCUMENTATION.md

      # Optional: Add --use-gemini to the step above if you want to explicitly enforce it, 
      # though your python code automatically catches it via the env variable!

      - name: Upload Documentation
        uses: actions/upload-artifact@v4
        with:
          name: pr-documentation
          path: DOCUMENTATION.md
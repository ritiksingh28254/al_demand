name: Generate Merge Documentation

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  generate-docs:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout merge commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.merge_commit_sha }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build merge context
        run: |
          python scripts/build_merge_context.py \
            --source-branch "${{ github.event.pull_request.head.ref }}" \
            --target-branch "${{ github.event.pull_request.base.ref }}" \
            --base-sha "${{ github.event.pull_request.base.sha }}" \
            --merge-sha "${{ github.event.pull_request.merge_commit_sha }}" \
            --output context.json

      - name: Generate documentation
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python src/generate_documentation.py \
            --context context.json \
            --output DOCUMENTATION.md \
            --use-gemini

      - name: Commit and push documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add DOCUMENTATION.md
          if git diff --cached --quiet; then
            echo "No documentation changes to commit."
            exit 0
          fi
          git commit -m "docs: update DOCUMENTATION.md after merge of PR #${{ github.event.pull_request.number }}"
          git push origin HEAD:${{ github.event.pull_request.base.ref }}
